global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # e.g. ["localhost:9093"] if running Alertmanager locally

scrape_configs:
  - job_name: "rice-model-exporter"
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          model: "rice-image-classifier"
          maintainer: "eko-muhamamad-rizki"
