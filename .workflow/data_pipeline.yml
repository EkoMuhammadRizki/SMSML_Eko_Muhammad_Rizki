# =============================================================
# GitHub Actions CI/CD — Data Preprocessing Pipeline
# =============================================================
# Criteria 1: Automated preprocessing execution on push/PR
#
# Author: Eko Muhammad Rizki
# Project: SMSML_Eko_Muhammad_Rizki
# =============================================================

name: Data Preprocessing Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      # ── Step 1: Checkout Repository ────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Python ───────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # ── Step 3: Install Dependencies ───────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Membangun_model/requirements.txt

      # ── Step 4: Create Data Directory ──────────────────────
      - name: Create data directories
        run: |
          mkdir -p data
          mkdir -p data/processed

      # ── Step 5: Run Preprocessing Pipeline ─────────────────
      - name: Run preprocessing pipeline
        run: |
          echo "=========================================="
          echo "Running Telco Churn Preprocessing Pipeline"
          echo "=========================================="
          python Membangun_model/telco_churn_preprocessing.py \
            --output-dir data/processed
          echo "=========================================="
          echo "Pipeline completed successfully!"
          echo "=========================================="

      # ── Step 6: Verify Outputs ─────────────────────────────
      - name: Verify preprocessing outputs
        run: |
          echo "Checking output files..."
          ls -la data/processed/
          echo ""
          echo "--- X_train shape ---"
          python -c "import pandas as pd; df=pd.read_csv('data/processed/X_train.csv'); print(f'Shape: {df.shape}')"
          echo ""
          echo "--- X_test shape ---"
          python -c "import pandas as pd; df=pd.read_csv('data/processed/X_test.csv'); print(f'Shape: {df.shape}')"
          echo ""
          echo "--- Preprocessing Summary ---"
          cat data/processed/preprocessing_summary.json

      # ── Step 7: Upload Processed Data as Artifact ──────────
      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 30

      # ── Step 8: Upload Feature Names ───────────────────────
      - name: Upload feature names
        uses: actions/upload-artifact@v4
        with:
          name: feature-names
          path: data/processed/feature_names.json
          retention-days: 30
